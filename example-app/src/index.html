<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor USB Printer Example</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <h1>USB Printer Control</h1>
      <p>Android USB Host & Web Compatibility Tester</p>

      <div class="card">
        <div class="section-title">
          <h2>1. Device Discovery</h2>
          <button onclick="listUsb()" class="outline">Scan for Devices</button>
        </div>
        <div class="input-group">
          <label for="deviceSelect">Select Printer(s)</label>
          <select id="deviceSelect" multiple size="4">
            <!-- populated dynamically -->
          </select>
        </div>
        <div class="flex">
          <button onclick="connectUsb()">Connect Selection</button>
          <button onclick="disconnectUsb()" class="secondary">Disconnect Selection</button>
          <button onclick="checkConnected()" class="secondary">Check Status</button>
        </div>
        <div class="flex" style="margin-top: 1rem;">
          <button onclick="connectAll()" class="secondary">Connect All</button>
          <button onclick="disconnectAll()" class="secondary">Disconnect All</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="section-title">
            <h2>2. Active Connections</h2>
          </div>
          <div id="connectedList" class="status-list">
            <div class="status-item" style="color: var(--text-muted);">No devices connected</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">
            <h2>3. Multi-Device Slots</h2>
          </div>
          <div class="input-group">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
              <button onclick="assignA()" class="secondary" style="padding: 0.4rem 0.8rem;">Assign to A</button>
              <span id="slotA" class="slot-badge">Slot A: (none)</span>
            </div>
            <div class="flex" style="justify-content: space-between; align-items: center;">
              <button onclick="assignB()" class="secondary" style="padding: 0.4rem 0.8rem;">Assign to B</button>
              <span id="slotB" class="slot-badge">Slot B: (none)</span>
            </div>
          </div>
          <div class="flex" style="margin-top: 1rem;">
            <button onclick="sendToA()" class="outline">Test Slot A</button>
            <button onclick="sendToB()" class="outline">Test Slot B</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>4. Print & Commands</h2>
        </div>
        <div class="input-group">
          <label for="sendInput">Custom Message</label>
          <input type="text" id="sendInput" value="Hello from Capacitor!" />
        </div>
        <div class="flex">
          <button onclick="sendUsb()" style="flex: 1;">Send Text</button>
          <button onclick="printTestReceipt()" class="outline">Sample Receipt (Binary)</button>
          <button onclick="kickDrawer()" class="secondary">Open Drawer</button>
          <button onclick="cutPaper()" class="secondary">Cut Paper</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>5. Diagnostics</h2>
        </div>
        <div class="input-group">
          <label for="echoInput">Echo Test Value</label>
          <div class="flex">
            <input type="text" id="echoInput" value="Capacitor 8" style="flex: 1;" />
            <button onclick="testEcho()" class="secondary">Test Echo</button>
          </div>
        </div>
      </div>

      <div class="section-title" style="margin-top: 2rem;">
        <h2>Console Output</h2>
        <button onclick="document.getElementById('log').innerHTML = ''" class="secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Clear Log</button>
      </div>
      <div id="log"></div>
    </main>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
